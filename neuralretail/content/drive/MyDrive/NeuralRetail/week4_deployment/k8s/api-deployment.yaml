
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-api
  namespace: neuralretail
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-api
  template:
    metadata:
      labels:
        app: fastapi-api
    spec:
      containers:
      - name: api
        image: neuralretail-api:latest
        ports:
        - containerPort: 8000
