
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
  namespace: neuralretail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-app
  template:
    metadata:
      labels:
        app: streamlit-app
    spec:
      containers:
      - name: streamlit
        image: neuralretail-streamlit:latest
        ports:
        - containerPort: 8501
